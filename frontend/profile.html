<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="FuelGO — Digital fuel payment platform for petrol stations">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>FuelGO – My Profile</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .profile-avatar-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .profile-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--gradient-primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
      position: relative; overflow: hidden; cursor: pointer;
      border: 3px solid var(--accent);
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-avatar-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      font-size: 1.3rem; color: white;
    }
    .profile-avatar:hover .profile-avatar-overlay { opacity: 1; }
    .profile-name { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; }
    .profile-role { font-size: 0.85rem; color: var(--text-secondary); }
    .section-divider {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary); font-weight: 700; padding: 8px 0 4px;
      border-bottom: 1px solid var(--border); margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fa-solid fa-gas-pump"></i></div>
        <img src="assets/logo.svg" alt="FuelGO" style="height:36px;width:auto">
      </a>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user">
        <div class="avatar avatar-md avatar-primary" id="user-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Loading…</div>
          <div class="sidebar-user-role" id="user-role">—</div>
        </div>
        <button class="sidebar-logout" title="Sign out" data-logout><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-content" style="animation:slideUp 0.4s ease both; max-width:600px">
        <div class="page-header">
          <div>
            <h1 class="page-title"><i class="fa-regular fa-circle-user"></i> My Profile</h1>
            <p class="page-subtitle">Manage your account details</p>
          </div>
        </div>

        <!-- Avatar & Name -->
        <div class="card" style="margin-bottom:20px">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profile-avatar" title="Click to change photo">
              <span id="profile-initials">?</span>
              <div class="profile-avatar-overlay"><i class="fa-solid fa-camera"></i></div>
            </div>
            <div style="text-align:center">
              <div class="profile-name" id="profile-name-display">—</div>
              <div class="profile-role"><span class="badge badge-primary" id="profile-role-badge">—</span></div>
            </div>
            <button class="btn btn-outline-primary btn-sm" id="change-photo-btn">
              <i class="fa-solid fa-camera"></i> Change Photo
            </button>
          </div>

          <div class="section-divider">Account Info</div>
          <form id="profile-form">
            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="p-fullname" class="form-control" placeholder="Full name" required>
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" id="p-phone" class="form-control" placeholder="+266 …">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" id="p-email" class="form-control" disabled style="opacity:0.6">
              <div class="form-feedback">Email cannot be changed</div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
          </form>
        </div>

        <!-- Change Password -->
        <div class="card" style="margin-bottom:20px">
          <div class="section-divider">Change Password</div>
          <form id="password-form">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <div class="input-group">
                <input type="password" id="p-current-pw" class="form-control" placeholder="Current password" required>
                <button type="button" class="input-addon" onclick="togglePw('p-current-pw',this)"><i class="fa-regular fa-eye"></i></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input type="password" id="p-new-pw" class="form-control" placeholder="New password (min 8 chars)" required>
                <button type="button" class="input-addon" onclick="togglePw('p-new-pw',this)"><i class="fa-regular fa-eye"></i></button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <input type="password" id="p-confirm-pw" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-accent btn-full"><i class="fa-solid fa-lock"></i> Update Password</button>
          </form>
        </div>

        <!-- Account Stats -->
        <div class="card" style="margin-bottom:20px">
          <div class="section-divider">Account Overview</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div class="stat-card stat-card-primary" style="margin:0">
              <div class="stat-card-label">Loyalty Points</div>
              <div class="stat-card-value" id="p-points">—</div>
            </div>
            <div class="stat-card stat-card-accent" style="margin:0">
              <div class="stat-card-label">Loyalty Tier</div>
              <div class="stat-card-value" id="p-tier">—</div>
            </div>
          </div>
          <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
            <a href="loyalty.html" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-star"></i> View Rewards</a>
            <a href="history.html" class="btn btn-ghost btn-sm"><i class="fa-solid fa-clock-rotate-left"></i> Transaction History</a>
            <a href="vehicles.html" class="btn btn-ghost btn-sm"><i class="fa-solid fa-car"></i> My Vehicles</a>
          </div>
        </div>

        <!-- Danger Zone -->
        <div class="card" style="border-color:var(--danger-light,#fca5a5);margin-bottom:20px">
          <div class="section-divider" style="color:var(--danger,#dc2626)">Danger Zone</div>
          <p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:16px">Sign out of your FuelGO account on this device.</p>
          <button class="btn btn-danger btn-sm" data-logout><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="js/loader.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const user = initAppFrame();

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
    }

    function setAvatarDisplay(avatarUrl, initials) {
      const el = document.getElementById('profile-avatar');
      const initialsEl = document.getElementById('profile-initials');
      if (avatarUrl) {
        initialsEl.style.display = 'none';
        let img = el.querySelector('img.profile-img');
        if (!img) {
          img = document.createElement('img');
          img.className = 'profile-img';
          el.insertBefore(img, el.firstChild);
        }
        img.src = avatarUrl;
      } else {
        initialsEl.textContent = initials;
        initialsEl.style.display = '';
        const img = el.querySelector('img.profile-img');
        if (img) img.remove();
      }
    }

    async function loadProfile() {
      try {
        const [me, loyalty] = await Promise.all([API.auth.me(), API.loyalty.get()]);
        const initials = (me.full_name || 'U').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
        setAvatarDisplay(me.avatar_url, initials);
        document.getElementById('profile-name-display').textContent = me.full_name || '—';
        document.getElementById('profile-role-badge').textContent = (me.role || '').charAt(0).toUpperCase() + (me.role || '').slice(1);
        document.getElementById('p-fullname').value = me.full_name || '';
        document.getElementById('p-phone').value = me.phone || '';
        document.getElementById('p-email').value = me.email || '';
        document.getElementById('p-points').textContent = (loyalty.points_balance || 0).toLocaleString() + ' pts';
        document.getElementById('p-tier').textContent = loyalty.tier || '—';
        hidePageLoader();
      } catch(e) {
        hidePageLoader();
        showToast('Failed to load profile', 'danger');
      }
    }

    // Avatar upload
    function triggerAvatarUpload() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const btn = document.getElementById('change-photo-btn');
        setBtnLoading(btn, true);
        try {
          const result = await API.upload.avatar(file);
          const currentUser = getCurrentUser();
          if (currentUser) { currentUser.avatar_url = result.avatar_url; setUser(currentUser); }
          const initials = (getCurrentUser()?.full_name || 'U').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
          setAvatarDisplay(result.avatar_url, initials);
          // Update sidebar avatar too
          const sidebarAvatar = document.getElementById('user-avatar');
          if (sidebarAvatar) sidebarAvatar.innerHTML = `<img src="${result.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">`;
          showToast('Profile photo updated!', 'success');
        } catch(err) {
          showToast('Upload failed: ' + err.message, 'danger');
        } finally {
          setBtnLoading(btn, false);
        }
      };
      input.click();
    }

    document.getElementById('profile-avatar').addEventListener('click', triggerAvatarUpload);
    document.getElementById('change-photo-btn').addEventListener('click', triggerAvatarUpload);

    // Save profile
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.submitter;
      setBtnLoading(btn, true);
      try {
        await API.auth.profile({
          full_name: document.getElementById('p-fullname').value.trim(),
          phone: document.getElementById('p-phone').value.trim() || null,
        });
        const currentUser = getCurrentUser();
        if (currentUser) {
          currentUser.full_name = document.getElementById('p-fullname').value.trim();
          setUser(currentUser);
          document.getElementById('profile-name-display').textContent = currentUser.full_name;
          const initials = currentUser.full_name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
          if (!currentUser.avatar_url) document.getElementById('profile-initials').textContent = initials;
          const nameEl = document.getElementById('user-name');
          if (nameEl) nameEl.textContent = currentUser.full_name;
        }
        showToast('Profile updated!', 'success');
      } catch(err) {
        showToast(err.message, 'danger');
      } finally {
        setBtnLoading(btn, false);
      }
    });

    // Change password
    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw = document.getElementById('p-new-pw').value;
      const confirmPw = document.getElementById('p-confirm-pw').value;
      if (newPw !== confirmPw) { showToast('New passwords do not match', 'danger'); return; }
      const btn = e.submitter;
      setBtnLoading(btn, true);
      try {
        await API.auth.changePassword({
          current_password: document.getElementById('p-current-pw').value,
          new_password: newPw,
        });
        document.getElementById('password-form').reset();
        showToast('Password updated successfully!', 'success');
      } catch(err) {
        showToast(err.message, 'danger');
      } finally {
        setBtnLoading(btn, false);
      }
    });

    loadProfile();
  </script>
</body>
</html>
