<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="FuelGO — Digital fuel payment platform for petrol stations">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>FuelGO – My Vehicles</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .vehicles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .vehicle-card-full {
      background: white; border: 2px solid var(--border); border-radius: var(--radius-md);
      padding: 24px; transition: all var(--transition); position: relative; overflow: hidden;
    }
    .vehicle-card-full:hover { border-color: var(--primary-light); box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .vehicle-card-full .vc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .vc-icon { width: 56px; height: 56px; background: var(--gradient-primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .vc-plate { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
    .vc-model { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px; }
    .vc-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--border); }
    .vehicle-card-full::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gradient-accent); border-radius: 4px 4px 0 0; }
    .add-vehicle-card {
      background: rgba(249,115,22,0.05); border: 2px dashed var(--accent);
      border-radius: var(--radius-md); padding: 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 180px; cursor: pointer; transition: all var(--transition-bounce);
      text-align: center;
    }
    .add-vehicle-card:hover { background: rgba(249,115,22,0.1); transform: scale(1.02); }
    .menu-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-xs); font-size: 20px; color: var(--text-secondary); transition: all var(--transition); }
    .menu-btn:hover { background: var(--surface-alt); color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fa-solid fa-gas-pump"></i></div>
        <img src="assets/logo.svg" alt="FuelGO" style="height:36px;width:auto">
      </a>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user">
        <div class="avatar avatar-md avatar-primary" id="user-avatar">JM</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Loading…</div>
          <div class="sidebar-user-role" id="user-role">Customer</div>
        </div>
        <button class="sidebar-logout" data-logout><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-content" style="animation:slideUp 0.4s ease both">
        <div class="page-header">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-car"></i> My Vehicles</h1>
            <p class="page-subtitle">Manage your registered vehicles</p>
          </div>
          <button class="btn btn-accent" onclick="openVehicleModal()">+ Add Vehicle</button>
        </div>

        <div class="vehicles-grid" id="vehicles-grid">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="vehicle-modal" style="display:none" onclick="closeModalOnOverlay(event,'vehicle-modal')">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="vehicle-modal-title">Add Vehicle</h2>
        <button class="modal-close" onclick="closeModal('vehicle-modal')">×</button>
      </div>
      <div class="modal-body">
        <form id="vehicle-form">
          <input type="hidden" id="vehicle-id">
          <div class="form-group">
            <label class="form-label">Plate Number <span class="required">*</span></label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-car"></i></span>
              <input type="text" id="plate-number" class="form-control font-mono" placeholder="LM 1234" required maxlength="20" style="text-transform:uppercase">
            </div>
            <div class="form-feedback" id="plate-feedback"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Vehicle Model</label>
            <div class="input-group">
              <span class="input-icon"><i class="fa-solid fa-car"></i></span>
              <input type="text" id="vehicle-model" class="form-control" placeholder="e.g. Toyota Corolla 2020">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Fuel Preference</label>
            <select class="form-select" id="fuel-preference">
              <option value="Petrol">Petrol</option>
              <option value="Diesel">Diesel</option>
              <option value="Premium">Premium</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('vehicle-modal')">Cancel</button>
        <button class="btn btn-accent" onclick="saveVehicle()" id="save-vehicle-btn">Save Vehicle</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="delete-modal" style="display:none" onclick="closeModalOnOverlay(event,'delete-modal')">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h2 class="modal-title">Remove Vehicle?</h2>
        <button class="modal-close" onclick="closeModal('delete-modal')">×</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center;padding:12px 0">
          <div style="font-size:48px;margin-bottom:16px"><i class="fa-solid fa-trash-can"></i></div>
          <p>Are you sure you want to remove <strong id="delete-plate">this vehicle</strong>? This action cannot be undone.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn">Yes, Remove</button>
      </div>
    </div>
  </div>

  <script src="js/loader.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const user = initAppFrame('customer');
    let vehicles = [];

    async function loadVehicles() {
      try {
        vehicles = await API.vehicles.getAll();
        renderVehicles();
        hidePageLoader();
      } catch(e) {
        hidePageLoader();
        showToast('Failed to load vehicles', 'danger');
      }
    }

    function renderVehicles() {
      const grid = document.getElementById('vehicles-grid');
      const fuelColors = { Petrol: 'badge-accent', Diesel: 'badge-primary', Premium: 'badge-warning' };
      const fuelEmoji = { Petrol:'<i class="fa-solid fa-gas-pump"></i>', Diesel:'<i class="fa-solid fa-oil-can"></i>', Premium:'<i class="fa-solid fa-gem"></i>' };
      const getFuel = v => v.fuel_name || v.fuel_preference || 'Petrol';
      const cardsHTML = vehicles.map((v, i) => `
        <div class="vehicle-card-full observe-animate" style="animation-delay:${i*0.08}s">
          <div class="vc-header">
            <div class="vc-icon"><i class="fa-solid fa-car"></i></div>
            <div class="dropdown" id="dd-${v.vehicle_id}">
              <button class="menu-btn" onclick="toggleMenu(${v.vehicle_id})">⋮</button>
              <div class="dropdown-menu" id="ddm-${v.vehicle_id}" style="display:none">
                <div class="dropdown-item" onclick="editVehicle(${v.vehicle_id})"><i class="fa-solid fa-pen-to-square"></i> Edit</div>
                <div class="dropdown-item" onclick="viewUsage(${v.vehicle_id})"><i class="fa-solid fa-chart-bar"></i> Usage Stats</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item danger" onclick="deleteVehicle(${v.vehicle_id}, '${v.plate_number}')"><i class="fa-solid fa-trash"></i> Remove</div>
              </div>
            </div>
          </div>
          <div class="vc-plate">${v.plate_number}</div>
          <div class="vc-model">${v.model || 'Unknown model'}</div>
          <div class="vc-footer">
            <span class="badge ${fuelColors[getFuel(v)]}">${fuelEmoji[getFuel(v)]} ${getFuel(v)}</span>
            <a href="pump.html" class="btn btn-accent btn-sm"><i class="fa-solid fa-gas-pump"></i> Fuel</a>
          </div>
        </div>
      `).join('');

      grid.innerHTML = cardsHTML + `
        <div class="add-vehicle-card" onclick="openVehicleModal()">
          <div style="font-size:44px;margin-bottom:12px;opacity:0.5">+</div>
          <div style="font-weight:700;font-size:1rem;color:var(--accent)">Add New Vehicle</div>
          <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:6px">Register your car, truck, or motorbike</div>
        </div>
      `;
      document.querySelectorAll('.btn').forEach(addRipple);
    }

    function toggleMenu(id) {
      const menu = document.getElementById(`ddm-${id}`);
      const isOpen = menu.style.display !== 'none';
      document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
      if (!isOpen) menu.style.display = 'block';
      document.addEventListener('click', e => {
        if (!e.target.closest(`#dd-${id}`)) menu.style.display = 'none';
      }, { once: true });
    }

    function openVehicleModal(vehicle = null) {
      document.getElementById('vehicle-modal-title').textContent = vehicle ? 'Edit Vehicle' : 'Add Vehicle';
      document.getElementById('vehicle-id').value = vehicle?.vehicle_id || '';
      document.getElementById('plate-number').value = vehicle?.plate_number || '';
      document.getElementById('vehicle-model').value = vehicle?.model || '';
      document.getElementById('fuel-preference').value = vehicle ? (vehicle.fuel_name || vehicle.fuel_preference || 'Petrol') : 'Petrol';
      document.getElementById('plate-number').readOnly = !!vehicle;
      openModal('vehicle-modal');
    }

    function editVehicle(id) {
      const v = vehicles.find(v => v.vehicle_id === id);
      if (v) openVehicleModal(v);
    }

    async function saveVehicle() {
      const id = document.getElementById('vehicle-id').value;
      const plate = document.getElementById('plate-number').value.trim().toUpperCase();
      const model = document.getElementById('vehicle-model').value.trim();
      const fuel = document.getElementById('fuel-preference').value;
      if (!plate) { setFieldState(document.getElementById('plate-number'), 'invalid', 'Plate number is required'); return; }
      const btn = document.getElementById('save-vehicle-btn');
      setBtnLoading(btn, true);
      try {
        if (id) await API.vehicles.update(parseInt(id), { model, fuel_preference: fuel });
        else await API.vehicles.create({ plate_number: plate, model, fuel_preference: fuel });
        closeModal('vehicle-modal');
        await loadVehicles();
        showToast(id ? 'Vehicle updated!' : 'Vehicle added!', 'success');
      } catch(e) {
        showToast(e.message, 'danger');
        if (!id) setFieldState(document.getElementById('plate-number'), 'invalid', e.message);
      }
      setBtnLoading(btn, false);
    }

    async function deleteVehicle(id, plate) {
      const confirmed = await confirmModal(
        'Remove Vehicle?',
        `This will permanently remove <strong>${plate}</strong>. This action cannot be undone.`,
        'Yes, Remove', 'red'
      );
      if (!confirmed) return;
      try {
        await API.vehicles.delete(id);
        await loadVehicles();
        notify('warning', 'Vehicle removed', `${plate} has been deleted`);
      } catch(e) { notify('error', 'Error', e.message); }
    }

    function viewUsage(id) {
      const v = vehicles.find(v => v.vehicle_id === id);
      showToast(`Viewing stats for ${v?.plate_number}`, 'info');
      window.location.href = `history.html?vehicle=${id}`;
    }

    // Plate uppercase enforce
    document.getElementById('plate-number').addEventListener('input', function() { this.value = this.value.toUpperCase(); });

    loadVehicles();
  </script>
</body>
</html>
