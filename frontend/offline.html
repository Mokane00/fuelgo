<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — FuelGO</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0F2548;
      --accent: #F97316;
      --bg: #f1f5f9;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #1e293b; }
      .card { background: #1e293b !important; }
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.95); } }
    h1 { font-size: 1.6rem; color: var(--primary); margin-bottom: 10px; }
    p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.65; margin-bottom: 28px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn:hover { background: #ea6d0d; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .status {
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      min-height: 1.2em;
    }
    .status.online { color: #22c55e; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon" id="icon">&#x1F4F5;</span>
    <h1>You're Offline</h1>
    <p>FuelGO can't connect to the network right now.<br>Please check your internet connection and try again.</p>
    <button class="btn" id="retry-btn" onclick="retryConnection()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      Try Again
    </button>
    <p class="status" id="status-text"></p>
  </div>

  <script>
    function retryConnection() {
      const btn = document.getElementById('retry-btn');
      const status = document.getElementById('status-text');
      btn.disabled = true;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Checking...';
      status.textContent = '';

      fetch('/api/health', { cache: 'no-store', signal: AbortSignal.timeout(5000) })
        .then(r => {
          if (r.ok) {
            status.className = 'status online';
            status.textContent = 'Connected! Redirecting...';
            setTimeout(() => window.location.replace('index.html'), 800);
          } else { throw new Error('not ok'); }
        })
        .catch(() => {
          status.className = 'status';
          status.textContent = 'Still offline. Please check your connection.';
          btn.disabled = false;
          btn.innerHTML = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Try Again';
        });
    }

    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      document.getElementById('status-text').className = 'status online';
      document.getElementById('status-text').textContent = 'Connection restored! Redirecting...';
      setTimeout(() => window.location.replace('index.html'), 1000);
    });
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
